# Built-in glossary — plain-language definitions of core Rust terms for a learner
# with no programming background, to consult OFFLINE (no internet, no LLM).
#
# Rules these entries follow:
#  - Synthesized from the bundled Rust Book chapters and ATTRIBUTED (`source` +
#    `book_chapter`, so the learner can read the full treatment).
#  - CONCEPTUAL: they explain the idea, never the fix to an exercise (Hard Rule #1
#    — e.g. the "mutability" entry never says "add `mut`").
#  - Plain language, no analogies to other programming languages.
#  - `aliases` let a lookup match the exercise `concept` tags + common spellings.
#
# Seeded into the store next to `book/` and `exercises/`, and served read-only via
# `/api/glossary`. Covers the vocabulary of the current exercise corpus (every
# exercise `concept` resolves to a term); grows as new exercises are added.

[[term]]
name = "binding"
aliases = ["let", "bindings", "variable binding", "variable", "variables"]
definition = "A binding is a name attached to a value with `let` (as in `let x = 5`) — often just called a *variable*. The name lets you refer to that value later in its scope. By default a binding is immutable — the value it holds cannot be reassigned."
book_chapter = "ch03-01-variables-and-mutability"
source = "The Rust Book, ch.3.1 \"Variables and Mutability\""

[[term]]
name = "mutability"
aliases = ["immutable", "mutable", "mut", "mutable-borrow-needs-mut"]
definition = "Whether a binding's value is allowed to change after it is set. In Rust a binding is IMMUTABLE by default — once a value is bound to a name you cannot change it — which is a nudge toward code whose values don't shift unexpectedly. Mutability is something you opt into deliberately, one binding at a time."
book_chapter = "ch03-01-variables-and-mutability"
source = "The Rust Book, ch.3.1 \"Variables and Mutability\""

[[term]]
name = "shadowing"
aliases = ["shadow", "shadowed"]
definition = "Declaring a new binding that reuses the name of an earlier one. From that point on, the name refers to the new binding; the earlier value is set aside. This is different from changing a value — you are creating a fresh binding, not mutating the old one (so the new one can even have a different type)."
book_chapter = "ch03-01-variables-and-mutability"
source = "The Rust Book, ch.3.1 \"Variables and Mutability\""

[[term]]
name = "type inference"
aliases = ["type-inference", "type-inference-limits", "inference", "annotation"]
definition = "The compiler working out a value's type from how it is written and used, so you don't always have to spell the type out. When the value is ambiguous and the compiler can't tell which type you mean, it stops and asks you to annotate the type explicitly."
book_chapter = "ch03-02-data-types"
source = "The Rust Book, ch.3.2 \"Data Types\""

[[term]]
name = "ownership"
aliases = ["owner", "owns", "owned"]
definition = "Rust's system for managing memory without a garbage collector, checked by the compiler so it costs nothing at run time. Its rules: each value has one owner; there is only one owner at a time; and when the owner goes out of scope, the value is dropped (cleaned up automatically)."
book_chapter = "ch04-01-what-is-ownership"
source = "The Rust Book, ch.4.1 \"What Is Ownership?\""

[[term]]
name = "scope"
aliases = ["in scope", "out of scope", "loop-variable-scope"]
definition = "The region of a program where a name is valid. A binding is valid from the point it is declared until the end of its enclosing block (the `{ ... }` it lives in); after that it is out of scope and its value is dropped."
book_chapter = "ch04-01-what-is-ownership"
source = "The Rust Book, ch.4.1 \"What Is Ownership?\""

[[term]]
name = "move"
aliases = ["move-semantics", "moved", "moves"]
definition = "When ownership of a value transfers from one binding to another — for example on assignment, or when you pass the value to a function. Because there is only ever one owner, the original binding can no longer be used after a move. This is what stops two names from trying to free the same data."
book_chapter = "ch04-01-what-is-ownership"
source = "The Rust Book, ch.4.1 \"What Is Ownership?\""

[[term]]
name = "borrowing"
aliases = ["borrow", "reference", "references", "borrow-checker-mut-vs-immut", "move-out-of-borrow", "borrow-checker-one-mut", "assign-while-borrowed", "move-while-borrowed"]
definition = "Accessing a value through a reference (written with `&`) instead of taking ownership of it. The owner keeps the value; the reference just points at it for as long as it is needed. Borrowing is how you use a value in more than one place without moving it away."
book_chapter = "ch04-02-references-and-borrowing"
source = "The Rust Book, ch.4.2 \"References and Borrowing\""

[[term]]
name = "closure"
aliases = ["closures", "anonymous function", "closure-type-inference"]
definition = "An anonymous function you can save in a binding or pass to another function. Unlike a named function, a closure can capture values from the scope where it is defined and use them later when it runs."
book_chapter = "ch13-01-closures"
source = "The Rust Book, ch.13.1 \"Closures: Anonymous Functions That Capture Their Environment\""

# ── batch 2 (2026-06-23): concept coverage for the rest of the corpus ──
# Drafted from the bundled Book chapters + adversarially verified (grounded,
# conceptual, no foreign-language analogy, no exercise-fix leak). See glossary-expansion workflow.

[[term]]
name = "explicit numeric conversion"
aliases = ["numeric type annotation", "converting between number types", "type annotation when converting"]
definition = "When a value could end up as several possible number types, Rust will not just pick one for you; you write down the exact number type you want so the compiler knows what kind of number to produce. Stating the type yourself is how you make the choice clear instead of leaving it to a guess."
book_chapter = "ch03-02-data-types"
source = "The Rust Book, ch.3.2 \"Data Types\""

[[term]]
name = "function argument types"
aliases = ["function-arg-types", "parameter type declaration", "declaring parameter types", "function signature types", "function-argument-count"]
definition = "Every special variable a function takes in (its parameters) must have its type written down in the function's opening line. This tells Rust exactly what kind of value each one expects before the function is ever used."
book_chapter = "ch03-03-how-functions-work"
source = "The Rust Book, ch.3.3 \"Functions\""

[[term]]
name = "if as an expression"
aliases = ["if-as-expression", "if expression", "if produces a value", "if branches same type"]
definition = "An `if` doesn't just choose which code to run; it also produces a value, so its result can be stored in a variable. Because that one variable can hold only a single kind of value, every branch of the `if` must produce a value of the same type."
book_chapter = "ch03-05-control-flow"
source = "The Rust Book, ch.3.5 \"Control Flow\""

[[term]]
name = "loop break value"
aliases = ["returning a value from a loop", "break with a value", "loop produces a value"]
definition = "A `loop` repeats a block of code until you stop it with `break`. You can place a value right after `break`, and that value is then handed back out of the loop so the rest of your program can use it."
book_chapter = "ch03-05-control-flow"
source = "The Rust Book, ch.3.5 \"Control Flow\""

[[term]]
name = "match exhaustiveness"
aliases = ["exhaustive match", "matches are exhaustive", "match must cover every case"]
definition = "A `match` compares a value against a list of patterns and must account for every possible case the value could be. If even one possibility is left out, the code is not considered valid, which stops you from silently forgetting a case."
book_chapter = "ch06-02-match"
source = "The Rust Book, ch.6.2 \"The match Control Flow Construct\""

[[term]]
name = "vector element type"
aliases = ["vec-element-type", "same type vector", "vec holds one type", "vector type"]
definition = "A vector is a list that stores many values next to each other, but every value in it must be of the same kind. You decide what kind of value a particular vector holds, and from then on it can only hold values of that one kind."
book_chapter = "ch08-01-vectors"
source = "The Rust Book, ch.8.1 \"Storing Lists of Values with Vectors\""

[[term]]
name = "string vs string slice"
aliases = ["string-vs-str", "String vs &str", "owned string vs string slice", "str", "string slice", "owned string"]
definition = "A String is a piece of text that your program owns and can grow or change. A string slice (written str, usually seen as &str) is a borrowed view into text stored somewhere else, which you can look at but do not own."
book_chapter = "ch08-02-strings"
source = "The Rust Book, ch.8.2 \"Storing UTF-8 Encoded Text with Strings\""

[[term]]
name = "iterating by reference"
aliases = ["iterate-by-reference", "borrow while iterating", "iter borrows", "iteration borrows", "iterator-into-iter-ownership"]
definition = "When you step through a collection by reference, each step gives you a borrowed look at a value instead of taking the value away. This lets you read the items while the original collection stays intact and usable afterward."
book_chapter = "ch13-02-iterators"
source = "The Rust Book, ch.13.2 \"Processing a Series of Items with Iterators\""

[[term]]
name = "collecting an iterator"
aliases = ["iterator-collect", "collect", "collect into a collection", "gather iterator results", "iterator-collect-inference", "iterator-consumer-sum"]
definition = "Stepping through a sequence on its own produces values one at a time without storing them. Collecting takes all those values as you go through them and gathers them into a single collection, such as a list, that you can keep and use."
book_chapter = "ch13-02-iterators"
source = "The Rust Book, ch.13.2 \"Processing a Series of Items with Iterators\""

[[term]]
name = "struct construction"
aliases = ["struct instance", "instantiating a struct", "building a struct", "creating a struct instance"]
definition = "A struct is a named bundle of related pieces of data, where each piece (called a field) has its own name. You build a usable value of that struct by giving every field a concrete value, written as name: value pairs."
book_chapter = "ch05-01-defining-structs"
source = "The Rust Book, ch.5.1 \"Defining and Instantiating Structs\""

[[term]]
name = "struct field privacy"
aliases = ["private field", "public field", "field privacy", "private struct field"]
definition = "A field of a struct can be kept hidden from code outside it (private) while a method that reads it is made visible (public). This getter pattern lets outside code see the value without being able to change it directly. (The book covers exactly how to mark things public or private in a later chapter.)"
book_chapter = "ch05-03-method-syntax"
source = "The Rust Book, ch.5.3 \"Method Syntax\""

[[term]]
name = "method syntax"
aliases = ["method", "calling a method", "dot method call", "method call"]
definition = "A method is a piece of behaviour attached to a particular type, defined alongside it. You run it by writing a value, then a dot, then the method's name with parentheses, so the method works on that specific value."
book_chapter = "ch05-03-method-syntax"
source = "The Rust Book, ch.5.3 \"Method Syntax\""

[[term]]
name = "extracting a value from option"
aliases = ["option-extract-value", "Option", "Some", "None", "handling Option", "maybe no value"]
definition = "An Option is a value that is either Some (it holds a real value inside) or None (it holds nothing). Because the two are different types, you cannot use the inner value straight away: you first have to look at which case you have and pull the value out of the Some case, handling the None case too. This forces you to deal with the 'maybe nothing' possibility before relying on the value."
book_chapter = "ch06-01-defining-an-enum"
source = "The Rust Book, ch.6.1 \"Defining an Enum\""

[[term]]
name = "module privacy"
aliases = ["item-privacy", "private by default", "private items", "public and private"]
definition = "By default, anything you define inside a module is hidden from the code around and above it: a parent module cannot reach into the private contents of its child modules. Inner (child) modules can still see and use the items of the modules that contain them. So items start out visible only within their own module and its descendants, until you deliberately choose to make them visible more widely."
book_chapter = "ch07-03-paths-for-referring-to-an-item-in-the-module-tree"
source = "The Rust Book, ch.7.3 \"Paths for Referring to an Item in the Module Tree\""

[[term]]
name = "use keyword"
aliases = ["use-and-paths", "use", "bringing paths into scope", "path shortcut", "import with use"]
definition = "The `use` keyword makes a shortcut to an item that lives somewhere deeper in your code, so afterward you can refer to it by a short name instead of writing out its full location every time. The shortcut only works inside the area where you wrote the `use` line."
book_chapter = "ch07-04-bringing-paths-into-scope-with-the-use-keyword"
source = "The Rust Book, ch.7.4 \"Bringing Paths into Scope with the use Keyword\""

[[term]]
name = "super path"
aliases = ["super-paths", "super", "parent module path", "super keyword"]
definition = "Writing `super` at the start of a path tells Rust to look in the parent module, the module that directly contains the current one. It lets code reach an item it knows lives one level up."
book_chapter = "ch07-03-paths-for-referring-to-an-item-in-the-module-tree"
source = "The Rust Book, ch.7.3 \"Paths for Referring to an Item in the Module Tree\""

[[term]]
name = "generic trait bounds"
aliases = ["trait bound", "trait bounds", "generics", "generic type parameter", "bound on a generic"]
definition = "Generics let you write one piece of code that works with many different types instead of repeating it for each type. A trait bound is added to a generic to limit it to only the types that have a certain set of behaviours, so the code is only used where it actually makes sense."
book_chapter = "ch10-02-traits"
source = "The Rust Book, ch.10.2 \"Defining Shared Behavior with Traits\""

[[term]]
name = "trait implementation"
aliases = ["trait", "implementing a trait", "impl trait for type", "shared behavior"]
definition = "A trait is a named group of methods that describes a set of behaviours a type can have. When a type implements a trait, it promises to provide its own version of each of those methods, so other code can rely on that behaviour being there."
book_chapter = "ch10-02-traits"
source = "The Rust Book, ch.10.2 \"Defining Shared Behavior with Traits\""

[[term]]
name = "lifetime annotations"
aliases = ["lifetime", "lifetimes", "lifetime parameter", "generic lifetime parameter", "struct-lifetime", "struct lifetime", "lifetime in struct"]
definition = "Every reference has a lifetime: the stretch of the program during which the thing it points to is still valid. A lifetime annotation is a label you add to references to describe how their valid stretches relate to each other, so the compiler can confirm the references stay valid for as long as they are used."
book_chapter = "ch10-03-lifetime-syntax"
source = "The Rust Book, ch.10.3 \"Validating References with Lifetimes\""

[[term]]
name = "no dangling references"
aliases = ["no-dangling-refs", "dangling reference", "dangling references", "dangling pointer", "borrow-must-not-outlive-value"]
definition = "A dangling reference is one that still points at a value after that value has gone away, so it ends up referring to data that is no longer there. Rust checks references as it compiles and refuses any program that would leave a reference pointing at data that is gone."
book_chapter = "ch10-03-lifetime-syntax"
source = "The Rust Book, ch.10.3 \"Validating References with Lifetimes\""

[[term]]
name = "move closures with threads"
aliases = ["thread-move-closures", "move closure", "move keyword with threads", "spawning a thread", "thread spawn closure", "capturing ownership in a thread"]
definition = "When you start a new thread, you hand it a small block of code to run. Putting the word move in front of that block tells Rust to hand ownership of any outside values the block uses over to the thread, so the thread fully owns them instead of just borrowing them from where they came."
book_chapter = "ch16-01-threads"
source = "The Rust Book, ch.16.1 \"Using move Closures with Threads\""

[[term]]
name = "send"
aliases = ["send-across-threads", "send trait", "send marker trait", "safe to move to another thread", "transferring ownership between threads"]
definition = "Send is a label Rust puts on a kind of value to mean it is safe to hand that value over to a different thread. Almost every kind of value carries this label, so Rust can stop you from passing along the few kinds that are not safe to move between threads."
book_chapter = "ch16-04-extensible-concurrency-sync-and-send"
source = "The Rust Book, ch.16.4 \"Transferring Ownership Between Threads\""

[[term]]
name = "shared mutable state"
aliases = ["mutex", "arc", "lock", "shared data across threads", "mutual exclusion"]
definition = "Shared mutable state is when several threads need to read and change the same piece of data at the same time. A mutex (short for mutual exclusion) keeps this orderly by letting only one thread touch the data at a time: a thread must take the mutex's lock before reading or changing the data, and others wait their turn until the lock is released."
book_chapter = "ch16-03-shared-state"
source = "The Rust Book, ch.16.3 \"Controlling Access with Mutexes\""

[[term]]
name = "unsafe and raw pointers"
aliases = ["unsafe-raw-pointers", "unsafe keyword", "raw pointer", "dereference a raw pointer", "unsafe block", "unsafe rust"]
definition = "The unsafe keyword opens a small section of code where you can do a handful of things the compiler is not able to check for you. One of those things is following a raw pointer, which is a stored memory location that Rust does not promise is valid, so you take on the responsibility of using it correctly."
book_chapter = "ch20-01-unsafe-rust"
source = "The Rust Book, ch.20.1 \"Unsafe Rust\""

[[term]]
name = "Box"
aliases = ["box", "smart pointer", "smart-pointer", "recursive-type-indirection", "heap indirection"]
definition = "A smart pointer that stores its value on the heap; what stays on the stack is just a small, fixed-size pointer to that heap data. Because the handle has a known size, a `Box` lets you give a known size to a value that otherwise wouldn't have one (such as a type that contains itself)."
book_chapter = "ch15-01-box"
source = "The Rust Book, ch.15.1 \"Using Box<T> to Point to Data on the Heap\""

[[term]]
name = "Rc"
aliases = ["rc", "reference counting", "reference-counting", "reference counted", "shared ownership", "shared-ownership", "reference-counted pointer"]
definition = "A smart pointer that lets a single value have MULTIPLE owners by keeping a count of how many references to it exist. Calling `Rc::clone` bumps that count and hands out another owner — it does NOT copy the underlying data; each owner that goes out of scope lowers the count, and the value is freed only when the count reaches zero. Reach for it when several parts of a program need to read the same heap data and you can't tell at compile time which one finishes last. (It is for single-threaded use.)"
book_chapter = "ch15-04-rc"
source = "The Rust Book, ch.15.4 \"Rc, the Reference Counted Smart Pointer\""

[[term]]
name = "FnOnce, FnMut, and Fn"
aliases = ["fnonce", "fn once", "fn-once", "fnmut", "fn mut", "fn traits", "closure-move-capture", "moving captured values"]
definition = "The three traits that describe HOW a closure uses what it captured, and so how many times you can call it. A closure that only READS its captures is `Fn` and can be called again and again; one that CHANGES a capture is `FnMut`; one that MOVES a capture OUT — gives it away — is `FnOnce` and can be called only once, because after that first call the value it handed off is gone. The compiler gives a closure the most permissive of these it qualifies for."
book_chapter = "ch13-01-closures"
source = "The Rust Book, ch.13.1 \"Moving Captured Values Out of Closures\""

[[term]]
name = "RefCell and interior mutability"
aliases = ["refcell", "interior mutability", "interior-mutability", "refcell-runtime-borrow", "runtime borrow check"]
definition = "A type that lets you change the value inside it even when you only hold a shared, immutable-looking handle to it — \"interior mutability\". To stay safe it still enforces the borrowing rules (many readers OR one writer, never both), but it checks them while the program RUNS instead of at compile time: ask for two writers at once and it does not refuse to compile — it PANICS when run. Reach for it (often together with `Rc`) when you need to mutate shared data and the compiler can't prove on its own that the borrows don't overlap."
book_chapter = "ch15-05-interior-mutability"
source = "The Rust Book, ch.15.5 \"RefCell and the Interior Mutability Pattern\""

[[term]]
name = "Result and recoverable errors"
aliases = ["result", "recoverable errors", "recoverable-errors", "result-extract-value", "ok and err", "error handling"]
definition = "Rust's way of handling operations that can FAIL without crashing the program. A `Result` is one of two things: `Ok(value)` when the operation succeeded, or `Err(reason)` when it didn't. Because the possible failure is baked into the RETURN TYPE, the compiler makes you deal with both cases before you can use the value inside — you can't accidentally forget that something might have gone wrong. (Its cousin `Option` covers the simpler \"there might be no value at all\" case.)"
book_chapter = "ch09-02-recoverable-errors-with-result"
source = "The Rust Book, ch.9.2 \"Recoverable Errors with Result\""

[[term]]
name = "the ? operator"
aliases = ["question mark operator", "question-mark", "error-propagation", "error propagation", "propagating errors", "try operator", "question-mark-option-vs-result"]
definition = "A shortcut for passing errors upward. Written right after an expression that produces a `Result` (or `Option`), `?` means: if the value is `Err` (or `None`), stop the current function and return that error to whoever called it; otherwise, take the `Ok` value out and carry on. It replaces a whole `match` that would check for the error case by hand. It only works inside a function that itself returns a `Result` or `Option`, because that return type is where the error gets sent."
book_chapter = "ch09-02-recoverable-errors-with-result"
source = "The Rust Book, ch.9.2 \"A Shortcut for Propagating Errors: the ? Operator\""

[[term]]
name = "the orphan rule and the newtype pattern"
aliases = ["orphan rule", "orphan-rule", "coherence", "coherence rule", "newtype", "newtype pattern", "orphan-rule-newtype", "external traits"]
definition = "The orphan rule (part of \"coherence\") says you may implement a trait for a type only if you define the trait, or you define the type — you can't add a foreign trait to a foreign type, because two unrelated crates could otherwise write conflicting impls and break each other. The newtype pattern is the way around it: wrap the foreign type in your own one-field struct (a \"newtype\") and implement the trait on that wrapper instead. The wrapper is a type you own, so the impl is allowed, and it costs nothing extra at runtime."
book_chapter = "ch20-02-advanced-traits"
source = "The Rust Book, ch.20.2 \"Advanced Traits — Implementing External Traits with the Newtype Pattern\""

[[term]]
name = "channels and message passing"
aliases = ["channel", "channels", "mpsc", "message passing", "message-passing", "channel-message-passing", "send and recv", "tx and rx"]
definition = "A way for threads to communicate by SENDING values to each other instead of sharing memory. A channel has two ends: a transmitter (`tx`) you send values down, and a receiver (`rx`) another thread reads them from. Sending a value MOVES it — ownership travels down the channel to the receiver, so once you've sent something you can no longer use it on the sending side. This message-passing style is an alternative to sharing state between threads and locking it with a `Mutex`."
book_chapter = "ch16-02-message-passing"
source = "The Rust Book, ch.16.2 \"Using Message Passing to Transfer Data Between Threads\""

[[term]]
name = "trait methods must be in scope"
aliases = ["trait in scope", "trait-in-scope", "import a trait", "use a trait", "method not found trait", "items from traits"]
definition = "A trait's methods are only callable where the trait itself is in scope — that is, where it has been brought in with a `use`. A type can implement a trait in one place, but if the code calling `.method()` has not imported the trait, the compiler reports the method as not found (even though the impl really exists) and suggests the `use` line you need. Bringing the trait into scope is what makes its methods available to call."
book_chapter = "ch10-02-traits"
source = "The Rust Book, ch.10.2 \"Traits: Defining Shared Behavior — Implementing a Trait on a Type\""

[[term]]
name = "unwrap and expect"
aliases = ["unwrap", "expect", "unwrap-panics-on-err", "panic on error", "unwrap or expect", "option-unwrap-panic"]
definition = "Two shortcuts for pulling the value out of a `Result` or `Option`. `unwrap()` gives you the inner value when it's `Ok`/`Some`, but PANICS (crashes the program) when it's `Err`/`None`. `expect(\"message\")` does the same but lets you attach your own message to the panic. They are a promise that the value can't be the error case — fine in quick code or tests, but in real programs you usually handle the error instead (with `match`, `unwrap_or`, or `?`) so one bad value doesn't bring everything down."
book_chapter = "ch09-02-recoverable-errors-with-result"
source = "The Rust Book, ch.9.2 \"Shortcuts for Panic on Error: unwrap and expect\""

[[term]]
name = "dynamically sized types (DSTs) and Sized"
aliases = ["dst", "dynamically sized types", "dynamically-sized-types", "unsized", "sized", "sized trait", "str vs &str"]
definition = "Most types have a size the compiler knows at compile time (they are `Sized`), so it can place them on the stack and pass them by value. A few types are DYNAMICALLY SIZED — their size isn't known until runtime, like `str` (the string data) or `[T]` (a slice's data). You can't hold or pass a dynamically sized value on its own; you use it behind a POINTER instead — `&str`, `&[T]`, or a `Box` — because the pointer has a known size even when the data behind it doesn't. That is why you see `&str` everywhere and almost never a bare `str`."
book_chapter = "ch20-03-advanced-types"
source = "The Rust Book, ch.20.3 \"Advanced Types — Dynamically Sized Types and the Sized Trait\""

[[term]]
name = "custom error types and From"
aliases = ["custom error", "custom error type", "custom-error-from", "from trait error", "error conversion", "from conversion"]
definition = "Real programs usually define their OWN error type (often an `enum`) so every way a function can fail comes back as one consistent kind. The `?` operator works smoothly with this: when you apply `?` to a `Result` whose error is some other type, `?` automatically converts that error into your function's error type — but only if you've implemented the `From` trait that says how to build your error from theirs. Writing that `From` impl is what lets `?` do the conversion for you, so a function with one error type can still use `?` on calls that fail in different ways."
book_chapter = "ch09-02-recoverable-errors-with-result"
source = "The Rust Book, ch.9.2 \"A Shortcut for Propagating Errors: the ? Operator\""

[[term]]
name = "HashMap"
aliases = ["hashmap", "hash map", "hashmap-insert-ownership", "key value store", "map"]
definition = "A collection that stores KEY → VALUE pairs and lets you look a value up quickly by its key — rather than by position, the way a `Vec` uses an index. You create one with `HashMap::new()` and add pairs with `.insert(key, value)`; inserting an owned value (like a `String`) moves it INTO the map, which takes ownership of it. Looking a key up with `.get(&key)` hands back an `Option`, because the key might not be in the map."
book_chapter = "ch08-03-hash-maps"
source = "The Rust Book, ch.8.3 \"Storing Keys with Associated Values in Hash Maps\""

[[term]]
name = "operator overloading"
aliases = ["operator overloading", "operator-overloading", "impl add", "add trait", "overload operator", "std ops"]
definition = "In Rust, operators like `+`, `-`, and `*` are not reserved for built-in number types — each one is backed by a TRAIT in `std::ops` (for example `+` is the `Add` trait, and `a + b` really means `a.add(b)`). You can make an operator work on your OWN type by implementing that trait for it: an `impl Add for YourType` with a `type Output` (what the operation returns) and an `add` method. Doing that is called operator overloading."
book_chapter = "ch20-02-advanced-traits"
source = "The Rust Book, ch.20.2 \"Advanced Traits — Operator Overloading\""

[[term]]
name = "supertrait"
aliases = ["supertrait", "supertraits", "trait requires another trait", "trait bound on trait", "required trait"]
definition = "A trait that another trait depends on. Writing `trait Child: Parent` means \"any type that implements `Child` must also implement `Parent`\" — `Parent` is the supertrait. Requiring it lets the child trait's own methods use the parent's behaviour, because every implementer is guaranteed to have it. A type that implements the child trait without the supertrait is rejected until it implements the parent too."
book_chapter = "ch20-02-advanced-traits"
source = "The Rust Book, ch.20.2 \"Advanced Traits — Using Supertraits\""

[[term]]
name = "trait object"
aliases = ["trait object", "trait objects", "trait-objects", "dyn", "dyn trait", "dynamic dispatch", "box dyn"]
definition = "A value used through a shared trait instead of through its concrete type, written `dyn Trait` and usually held behind a pointer such as `Box<dyn Trait>` or `&dyn Trait`. It lets one collection or function work with a MIX of types that all implement the same trait — for example a `Vec<Box<dyn Shape>>` holding both a `Circle` and a `Square`. Calling a method on a trait object uses DYNAMIC DISPATCH: the concrete type is not known at compile time, so the right impl is looked up at run time. That trades a little speed for flexibility — the run-time counterpart to the compile-time dispatch you get from generics and trait bounds."
book_chapter = "ch18-02-trait-objects"
source = "The Rust Book, ch.18.2 \"Using Trait Objects to Abstract over Shared Behavior\""

[[term]]
name = "enum with data"
aliases = ["enum with data", "enums with data", "enum data", "enum-data", "tuple variant", "data-carrying variant", "pattern binding", "binding in match"]
definition = "An `enum` lists the possible forms a value can take, and each variant may CARRY its own data: `enum Event { Click(i32, i32), KeyPress(char), Closed }` says an `Event` is either a click at some coordinates, a key press of some character, or a plain close with no data. To read that data back out you `match` the value and BIND it in the pattern — `Event::KeyPress(c)` names the character `c` so the arm can use it. A variant that carries data must be matched with a pattern of the same shape, e.g. `Click(x, y)`; writing the bare name `Click` is rejected, because that is the pattern for a variant that carries nothing."
book_chapter = "ch06-01-defining-an-enum"
source = "The Rust Book, ch.6.1 \"Defining an Enum\" + ch.6.2 \"Patterns That Bind to Values\""

[[term]]
name = "indexing and bounds checking"
aliases = ["indexing and bounds checking", "index out of bounds", "bounds checking", "bounds check", "vec-index-bounds", "vec indexing", "out of bounds"]
definition = "Reading an element by position, like `v[2]`, where positions are ZERO-BASED (the first element is `v[0]`). Rust guarantees you can never read past the end into unrelated memory: it checks the index against the length at run time, and if the index is out of range the program PANICS instead of returning garbage. That safety check is why an out-of-range index is a run-time crash, not a silent bug. To look something up without risking a panic, `v.get(i)` returns an `Option` — `None` when that position doesn't exist, `Some(&value)` when it does."
book_chapter = "ch08-01-vectors"
source = "The Rust Book, ch.8.1 \"Reading Elements of Vectors\""

[[term]]
name = "integer overflow"
aliases = ["integer overflow", "overflow", "integer-overflow", "arithmetic overflow", "checked_mul", "wrapping", "fixed range"]
definition = "Every integer type has a fixed size, and so a fixed range — a `u8` holds 0 to 255, an `i32` roughly plus or minus two billion. When a calculation produces a value outside that range it OVERFLOWS. Rust does not leave that as a silent wrong answer: a debug build checks every arithmetic operation and PANICS on overflow, so the bug surfaces immediately; a release build wraps around for speed. When you genuinely want a defined result, ask for it explicitly with `checked_*` (returns an `Option`), `saturating_*` (clamps to the type's min or max), or `wrapping_*` (wraps on purpose). The everyday fix is to pick a type wide enough for the values."
book_chapter = "ch03-02-data-types"
source = "The Rust Book, ch.3.2 \"Data Types — Integer Types\""
[[term]]
name = "crate"
aliases = ["crates", "binary crate", "library crate", "crate root"]
definition = "A crate is the unit of code the Rust compiler builds at one time — under the surface it is a tree of modules. There are two kinds: a BINARY crate has a `main` function and compiles to a program you can run, while a LIBRARY crate has no `main` and holds code meant to be shared and reused. The file the compiler starts from is the crate root (`src/main.rs` for a binary, `src/lib.rs` for a library). A package — what `cargo new` produces — bundles one or more crates together with a `Cargo.toml`."
book_chapter = "ch07-01-packages-and-crates"
source = "The Rust Book, ch.7.1 \"Packages and Crates\""

[[term]]
name = "panic"
aliases = ["panic!", "panics", "panicking", "panicked", "unrecoverable error"]
definition = "A panic is Rust's response to an unrecoverable error: the program prints a message and stops the current thread instead of carrying on in a broken state. You can trigger one on purpose with the `panic!` macro, and some operations panic for you — for example asking for a value that turned out to be missing or erroneous. Panics are meant for bugs and situations that should be impossible; an error you expect and want to handle should travel as a `Result` instead, so the caller can decide what to do."
book_chapter = "ch09-01-unrecoverable-errors-with-panic"
source = "The Rust Book, ch.9.1 \"Unrecoverable Errors with panic!\""

[[term]]
name = "if let"
aliases = ["if-let", "while let", "let else"]
definition = "`if let` is a shorter way to act on just ONE pattern instead of writing a full `match`. Written `if let Some(x) = maybe { ... }`, the block runs only when the value matches that pattern, binding the inner data (here `x`) for use inside; an optional `else` covers every other case. The trade-off is that you give up the exhaustiveness checking `match` gives you, so reach for it when you genuinely care about only one case. Its relatives `while let` (keep looping while a pattern matches) and `let ... else` (bind on success or else diverge) follow the same idea."
book_chapter = "ch06-03-if-let"
source = "The Rust Book, ch.6.3 \"Concise Control Flow with if let\""

[[term]]
name = "tuple"
aliases = ["tuples", "tuple type", "unit value", "unit type"]
definition = "A tuple groups a FIXED number of values — which may be of different types — into one compound value, written with parentheses like `(1, \"hi\", true)`. You reach the parts by position (`t.0`, `t.1`, and so on) or by destructuring into separate names (`let (a, b, c) = t`). A tuple's length is fixed once it is written. The empty tuple `()` is called the unit value, and it is what an expression or function produces when it has no other meaningful value to return."
book_chapter = "ch03-02-data-types"
source = "The Rust Book, ch.3.2 \"Data Types — The Tuple Type\""
[[term]]
name = "array"
aliases = ["arrays", "array type"]
definition = "An array is a fixed-length sequence of values that all share one type, written in square brackets like `[10, 20, 30]`; its type is written `[i32; 3]` (element type, then length). The length is part of the type and fixed at compile time, and the whole array is stored inline rather than on the heap. Reading past the end is not allowed — a constant out-of-range index is caught at compile time, and a runtime one stops the program rather than reading stray memory. When you need a sequence that can grow or shrink, reach for a vector instead."
book_chapter = "ch03-02-data-types"
source = "The Rust Book, ch.3.2 \"Data Types — The Array Type\""

[[term]]
name = "slice"
aliases = ["slices", "slice type"]
definition = "A slice is a reference to a contiguous run of elements WITHIN a collection — part of an array, vector, or string — rather than the whole thing, written with a range like `&v[1..4]`. It borrows the data instead of owning a copy, so it is cheap, and while a slice is alive the collection it points into cannot be changed (that borrow rule is what makes slices safe). A general slice has the type `&[T]`; a slice of a string is the special case `&str`. A slice also remembers its length, so it always knows where it ends."
book_chapter = "ch04-03-slices"
source = "The Rust Book, ch.4.3 \"The Slice Type\""

[[term]]
name = "Copy"
aliases = ["copy", "copy type", "copy trait", "copy semantics", "stack copy"]
definition = "`Copy` marks a type whose values are duplicated automatically instead of moved. The small, fixed-size types that live entirely on the stack — the integer, float, `bool`, and `char` types, and tuples of only those — are `Copy`: after `let b = a;` you can still use `a`, because `b` received its own independent copy. Types that own data elsewhere (such as `String` or a vector) are NOT `Copy`; assigning one moves ownership instead, which is why the original name can no longer be used afterward. This is the reason some values stay usable after assignment and others do not."
book_chapter = "ch04-01-what-is-ownership"
source = "The Rust Book, ch.4.1 \"What is Ownership?\" (Stack-Only Data: Copy)"

[[term]]
name = "Clone"
aliases = ["clone", "cloning", ".clone()", "deep copy"]
definition = "`Clone` is for making an explicit, complete copy of a value when the type does not copy automatically. Writing `let b = a.clone();` gives `b` its own separate data and leaves `a` fully usable — where a plain `let b = a;` would have moved `a` for a type that owns heap data. Because cloning can be real work (it may duplicate a whole collection or string), it is spelled out with `.clone()` rather than happening silently: the cost is made visible on purpose so you choose it deliberately."
book_chapter = "ch04-01-what-is-ownership"
source = "The Rust Book, ch.4.1 \"What is Ownership?\" (Ways Variables and Data Interact: Clone)"

[[term]]
name = "dereference"
aliases = ["dereference", "dereferencing", "deref", "star operator", "* operator"]
definition = "Dereferencing follows a reference to reach the value it points at, written with a leading `*` (as in `*r`). A reference such as `&x` is a borrow that lets you use a value without owning it; putting `*` in front of the reference gives you the underlying value itself. Many everyday uses need no explicit `*` because the compiler inserts it for you — for example when you call a method through a reference — but you write it yourself when you need the value rather than the reference, such as doing arithmetic or a comparison through one."
book_chapter = "ch04-02-references-and-borrowing"
source = "The Rust Book, ch.4.2 \"References and Borrowing\""

[[term]]
name = "constant"
aliases = ["const", "constants"]
definition = "A constant is a name bound to a value that can never change and is fixed when the program is compiled. You declare it with `const` rather than a regular binding, you must always write out its type, and by convention its name is in SCREAMING_SNAKE_CASE (as in `const MAX_LEVEL: u32 = 100`). A constant may be declared in any scope, including the top level of a file, and stays valid for the whole run of the program."
book_chapter = "ch03-01-variables-and-mutability"
source = "The Rust Book, ch.3.1 \"Variables and Mutability\""

[[term]]
name = "expression"
aliases = ["expressions", "evaluates to a value"]
definition = "An expression is a piece of code that evaluates to a value. Most of Rust is built from expressions — `5 + 6`, a function call, a `match`, even a block written `{ ... }` can produce a value. Because a block is itself an expression, the last line of a function body, written with no trailing semicolon, becomes the value that block hands back."
book_chapter = "ch03-03-how-functions-work"
source = "The Rust Book, ch.3.3 \"Functions\""

[[term]]
name = "statement"
aliases = ["statements"]
definition = "A statement is a piece of code that performs an action but does not evaluate to a value. A `let` binding is a statement, and so is any expression once a semicolon is placed after it — the semicolon discards the value. Because a statement has no value, there is nothing to hand back or read out of it; that is the counterpart to an expression, which does produce a value."
book_chapter = "ch03-03-how-functions-work"
source = "The Rust Book, ch.3.3 \"Functions\""

[[term]]
name = "macro"
aliases = ["macros", "println macro", "bang operator"]
definition = "A macro is code that writes code: when the compiler meets a macro call it expands into more Rust before the program is built. You call one by putting a `!` right after its name — `println!`, `vec!`, `panic!` — and that `!` is exactly how you tell a macro call apart from an ordinary function call. Macros can do things a plain function cannot, such as accept any number of arguments or check a format string as the code compiles, which is why printing text is a macro rather than a function."
book_chapter = ""
source = "The Rust Book, ch.19.5 \"Macros\" (and the println! you meet from the very first program)"

[[term]]
name = "type annotation"
aliases = ["type annotations", "annotation", "annotate the type"]
definition = "A type annotation is where you write a value's type explicitly, after a colon — `let count: u32 = 5;`, or a function parameter like `n: i32`. Often you can leave it off and the compiler infers the type from how the value is used; but sometimes it can't tell which type you mean and needs you to say, and a few places always require one (function parameters, and `const`)."
book_chapter = "ch03-02-data-types"
source = "The Rust Book, ch.3.2 \"Data Types\""

[[term]]
name = "cargo"
aliases = ["Cargo", "cargo new", "cargo run", "Cargo.toml"]
definition = "Cargo is Rust's build tool and package manager — the command you use to start, build, run, and test a project. `cargo new name` lays out a project the standard way, `cargo run` compiles and runs it, and `cargo test` runs its tests. It reads a `Cargo.toml` file that lists the project's name and its dependencies (other people's crates), fetching and building them for you."
book_chapter = ""
source = "The Rust Book, ch.1.3 \"Hello, Cargo!\" (and The Cargo Book)"
