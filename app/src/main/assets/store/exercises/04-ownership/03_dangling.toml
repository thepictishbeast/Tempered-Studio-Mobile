id = "ownership/03_dangling"
title = "Dangling references: a function can't return a borrow into its own locals"
difficulty = "beginner"
estimated_minutes = 8
concept = "no-dangling-refs"
expected_error_code = "E0515"
solution_outline = """
The function owns `g`. When it returns, `g` is dropped — any
reference INTO `g` would be left dangling. Rust catches this at
compile time and refuses to let the reference escape.

Two clean fixes, ranked by what matches the spirit of "make_greeting":

1. Return ownership of the String instead of a borrow:
       fn make_greeting() -> String {
           String::from("hello, world")
       }
   `main` already binds the result to `let s = ...`; ownership
   transfers cleanly.

2. Return a `&'static str` literal — works because string literals
   live in the binary's read-only data section, which never gets
   dropped:
       fn make_greeting() -> &'static str {
           "hello, world"
       }

The wrong instinct is to add a lifetime parameter — there's no
inbound reference for it to borrow from, so any lifetime annotation
just moves the error around.
"""

