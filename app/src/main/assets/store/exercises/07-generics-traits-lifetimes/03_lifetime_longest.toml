id = "lifetimes/01_longest"
title = "When a returned reference could come from either input, you must say so"
difficulty = "intermediate"
estimated_minutes = 12
concept = "lifetime-annotations"
expected_error_code = "E0106"
solution_outline = """
The returned `&str` borrows from `x` or `y`, but the signature doesn't say which,
so the compiler can't know how long it stays valid. Tie them together with a named
lifetime: `fn longest<'a>(x: &'a str, y: &'a str) -> &'a str`. You're not changing
how long anything lives — you're *describing* a relationship the compiler can't
infer here: the result lives at least as long as both inputs.
"""

[[book_refs]]
chapter = "ch10-03-lifetime-syntax"
anchor = "lifetime-annotation-syntax"
why = "What `<'a>` and `&'a str` mean — annotating, not changing, how long a reference is valid."

