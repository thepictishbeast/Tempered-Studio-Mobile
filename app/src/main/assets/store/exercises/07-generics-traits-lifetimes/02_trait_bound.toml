id = "traits/01_display_bound"
title = "A type must implement a trait before a bound will accept it"
difficulty = "intermediate"
estimated_minutes = 12
concept = "trait-implementation"
expected_error_code = "E0277"
solution_outline = """
`show` only accepts types that implement `Display`, and `Point` doesn't — so the
bound `T: Display` rejects it. Teach `Point` how to display itself by implementing
the trait: `impl std::fmt::Display for Point { fn fmt(&self, f: &mut Formatter)
-> Result { write!(f, "({}, {})", self.x, self.y) } }`. The bound is a contract;
the `impl` is how a type signs it.
"""

