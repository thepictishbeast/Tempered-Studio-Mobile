id = "collections/02_string_vs_str"
title = "String vs &str: owned vs borrowed text"
difficulty = "beginner"
estimated_minutes = 6
concept = "string-vs-str"
expected_error_code = "E0308"
solution_outline = """
A `"..."` literal is a `&str` (a borrowed view). To get an owned
`String`, convert it: `let greeting: String = "hello".to_string();`
(or `String::from("hello")`). Same characters, different type.
"""

