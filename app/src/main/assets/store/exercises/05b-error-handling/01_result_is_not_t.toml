id = "error-handling/01_result_is_not_t"
title = "Result is not T: handle the error case first"
difficulty = "beginner"
estimated_minutes = 8
concept = "result-extract-value"
expected_error_code = "E0308"
solution_outline = """
A `Result<i32, _>` is a wrapper that is EITHER `Ok(i32)` or `Err(error)` — not an
`i32` — so binding it straight to `let n: i32` fails (E0308). Open the Result and
handle BOTH outcomes before using the value: `let n = match to_number("42") { Ok(v)
=> v, Err(_) => 0 };` (decide a fallback for the failure case). `if let Ok(v) = ...`
or `.unwrap_or(0)` also work; `unwrap()` works too but PANICS on `Err`, so deciding
what to do on failure is safer. Deal with the error case — don't ignore it.
"""

