id = "types/03_option_value"
title = "Option<T> is not T: get the value out first"
difficulty = "beginner"
estimated_minutes = 8
concept = "option-extract-value"
expected_error_code = "E0308"
solution_outline = """
Pull the inner value out before binding it to an `i32`. Idiomatic:
`let value = match maybe { Some(n) => n, None => 0 };` (decide what to do
when there's no value). Or `if let Some(n) = maybe { ... }`. `unwrap()`
works too but panics on `None` — matching is safer.
"""

