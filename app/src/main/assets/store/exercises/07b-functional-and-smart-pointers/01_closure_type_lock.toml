id = "closures/01_closure_type_lock"
title = "A closure's types are inferred from its first use — then locked"
difficulty = "intermediate"
estimated_minutes = 6
concept = "closure-type-inference"
expected_error_code = "E0308"
solution_outline = """
A closure is not generic. The first call `echo(5)` fixes the parameter type to an
integer, so the later `echo("hello")` (a `&str`) no longer matches — that is the
E0308 the compiler flags on the second call. Make the calls consistent: pass the
same type to both (two integers, or two `&str`s). If something genuinely needs to
work over many types, that's a generic function, not one closure — a later topic.
"""

[[book_refs]]
chapter = "ch13-01-closures"
anchor = "inferring-and-annotating-closure-types"
why = "The Book shows exactly this: a closure's types are inferred from the first call and then fixed."
